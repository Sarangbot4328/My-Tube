name: Build APK

# Repo layout: upload contents of local "My Tube APK" to repo ROOT
#   app/  build.gradle  settings.gradle  .github/workflows/build-apk.yml

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEYSTORE_TYPE: PKCS12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Require signing secrets
        shell: bash
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing repository secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Settings → Secrets and variables → Actions 에 4개 시크릿을 등록하세요. SIGNING_SETUP.md 참고."
            exit 1
          fi

      - name: Restore PKCS12 keystore and resolve alias
        shell: bash
        run: |
          set -euo pipefail
          ANDROID_KEYSTORE_PATH="$RUNNER_TEMP/mytube-release.p12"
          echo "ANDROID_KEYSTORE_PATH=$ANDROID_KEYSTORE_PATH" >> "$GITHUB_ENV"

          # Decode (strip whitespace/newlines people paste by accident)
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ' | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          ls -la "$ANDROID_KEYSTORE_PATH"
          file "$ANDROID_KEYSTORE_PATH" || true

          # List aliases with Java KeyStore API (more reliable than keytool text parse for PKCS12)
          cat > "$RUNNER_TEMP/ListAlias.java" <<'JAVA'
          import java.io.FileInputStream;
          import java.security.KeyStore;
          import java.util.Enumeration;
          public class ListAlias {
            public static void main(String[] args) throws Exception {
              KeyStore ks = KeyStore.getInstance("PKCS12");
              try (FileInputStream in = new FileInputStream(args[0])) {
                ks.load(in, args[1].toCharArray());
              }
              Enumeration<String> e = ks.aliases();
              if (!e.hasMoreElements()) {
                System.err.println("EMPTY_KEYSTORE");
                System.exit(2);
              }
              while (e.hasMoreElements()) {
                System.out.println(e.nextElement());
              }
            }
          }
          JAVA
          javac "$RUNNER_TEMP/ListAlias.java"
          mapfile -t ALIASES < <(java -cp "$RUNNER_TEMP" ListAlias "$ANDROID_KEYSTORE_PATH" "$ANDROID_KEYSTORE_PASSWORD")
          if [ "${#ALIASES[@]}" -eq 0 ]; then
            echo "::error::키스토어를 열 수 없거나 alias가 없습니다. BASE64/비밀번호가 맞는지, PowerShell로 만든 깨진 p12가 아닌지 확인하세요."
            echo "권장: 로컬 mytube-keystore.base64.txt 내용을 ANDROID_KEYSTORE_BASE64 시크릿에 다시 붙여넣기, ALIAS=mytube"
            keytool -list -storetype PKCS12 -keystore "$ANDROID_KEYSTORE_PATH" -storepass "$ANDROID_KEYSTORE_PASSWORD" || true
            exit 1
          fi
          echo "Aliases in keystore:"
          printf ' - %s\n' "${ALIASES[@]}"

          RESOLVED=""
          for a in "${ALIASES[@]}"; do
            if [ "$a" = "$ANDROID_KEY_ALIAS" ]; then RESOLVED="$a"; break; fi
          done
          if [ -z "$RESOLVED" ]; then
            # case-insensitive match
            for a in "${ALIASES[@]}"; do
              if [ "${a,,}" = "${ANDROID_KEY_ALIAS,,}" ]; then RESOLVED="$a"; break; fi
            done
          fi
          if [ -z "$RESOLVED" ]; then
            RESOLVED="${ALIASES[0]}"
            echo "::warning::Secret ANDROID_KEY_ALIAS='$ANDROID_KEY_ALIAS' not in keystore. Using first alias: $RESOLVED"
          else
            echo "Using alias: $RESOLVED"
          fi
          echo "ANDROID_KEY_ALIAS=$RESOLVED" >> "$GITHUB_ENV"

          # Sanity: entry must have a key
          keytool -list -storetype PKCS12 \
            -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$RESOLVED"

      - name: Build signed release APK
        run: gradle assembleRelease --stacktrace

      - name: Verify release signature
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/app-release.apk"
          test -f "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          CERTS=$("$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --print-certs "$APK" 2>&1 || true)
          if echo "$CERTS" | grep -qi "CN=Android Debug"; then
            echo "::error::Still signed with Android Debug key."
            exit 1
          fi
          cp "$APK" app/build/outputs/apk/release/my-tube.apk
          echo "Release APK ready: my-tube.apk"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: my-tube-release-apk
          path: app/build/outputs/apk/release/my-tube.apk
          if-no-files-found: error
